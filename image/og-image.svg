<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg { fill: #f5f4f0; }
      .primary { fill: #1c1c2e; font-family: "Noto Serif TC", "PingFang TC", serif; font-weight: 900; }
      .secondary { fill: #1c1c2e; font-family: "Noto Serif TC", "PingFang TC", serif; font-weight: 700; }
      .muted { fill: #75758f; font-family: "Noto Sans TC", "PingFang TC", sans-serif; font-weight: 500; }
      .tag-text { fill: #ffffff; font-family: "Noto Sans TC", "PingFang TC", sans-serif; font-weight: 700; }
      .mono { font-family: "DM Mono", "Menlo", monospace; fill: #75758f; font-weight: 500; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="630"/>

  <!-- 頂部四色條（四階段）-->
  <rect x="0"   y="0" width="300" height="12" fill="#2952c4"/>
  <rect x="300" y="0" width="300" height="12" fill="#1e7a52"/>
  <rect x="600" y="0" width="300" height="12" fill="#a3551a"/>
  <rect x="900" y="0" width="300" height="12" fill="#6d28d9"/>

  <!-- 學校識別 -->
  <text x="80" y="120" class="muted" font-size="26">松山高中 · 108 課綱自然科必修</text>

  <!-- 主標題 -->
  <text x="80" y="230" class="primary" font-size="104">探究與實作</text>

  <!-- 副標 -->
  <text x="80" y="305" class="secondary" font-size="40">從論證建模到發現問題</text>

  <!-- 三站標籤 -->
  <g transform="translate(80, 380)">
    <rect x="0"   y="0" width="170" height="60" rx="10" fill="#2952c4"/>
    <text x="85"  y="40" class="tag-text" font-size="30" text-anchor="middle">論證建模</text>

    <rect x="188" y="0" width="170" height="60" rx="10" fill="#1e7a52"/>
    <text x="273" y="40" class="tag-text" font-size="30" text-anchor="middle">規劃研究</text>

    <rect x="376" y="0" width="170" height="60" rx="10" fill="#a3551a"/>
    <text x="461" y="40" class="tag-text" font-size="30" text-anchor="middle">發現問題</text>
  </g>

  <!-- 右側：九大主題的星座圖 -->
  <g transform="translate(1000, 315)">
    <circle cx="0" cy="0" r="14" fill="#1c1c2e"/>
    <!-- 9 個主題節點 -->
    <circle cx="0"   cy="-100" r="8" fill="#2952c4"/>
    <circle cx="64"  cy="-77"  r="8" fill="#1e7a52"/>
    <circle cx="98"  cy="-17"  r="8" fill="#a3551a"/>
    <circle cx="86"  cy="52"   r="8" fill="#6d28d9"/>
    <circle cx="34"  cy="94"   r="8" fill="#2952c4"/>
    <circle cx="-34" cy="94"   r="8" fill="#1e7a52"/>
    <circle cx="-86" cy="52"   r="8" fill="#a3551a"/>
    <circle cx="-98" cy="-17"  r="8" fill="#6d28d9"/>
    <circle cx="-64" cy="-77"  r="8" fill="#2952c4"/>
  </g>

  <!-- 底部：網址 -->
  <text x="80" y="560" class="mono" font-size="24">sssh-inquiry.vercel.app</text>
</svg>
